name: Build experimental Node 22 and IPA

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: experimental-node22-device
  cancel-in-progress: false

jobs:
  build-device-and-ipa:
    name: Node 22 / arm64 and unsigned IPA
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Checkout app source
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version
          uname -m

      # Node/V8 produces large target and host object trees. The standard
      # macos-15 image contains many other complete Xcode installations, and
      # the previous build exhausted the runner disk while libtool was creating
      # libv8_base_without_compiler.a. Keep only the explicitly selected Xcode.
      - name: Reclaim runner disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /

          sudo rm -rf -- \
            /Applications/Xcode_26.3.app \
            /Applications/Xcode_26.3.0.app \
            /Applications/Xcode_26.2.app \
            /Applications/Xcode_26.2.0.app \
            /Applications/Xcode_26.1.1.app \
            /Applications/Xcode_26.1.app \
            /Applications/Xcode_26.0.1.app \
            /Applications/Xcode_26.0.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.3.0.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.2.0.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.1.0.app \
            /Applications/Xcode_16.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode_16.0.0.app

          test -x /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

          echo "Disk space after cleanup:"
          df -h /

          available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
          minimum_kb="$((30 * 1024 * 1024))"
          if [[ "${available_kb}" -lt "${minimum_kb}" ]]; then
            echo "Less than 30 GiB is available after cleanup; refusing to start the hour-long build." >&2
            exit 1
          fi

      - name: Build pinned NodeMobile 22 device runtime
        run: |
          chmod +x scripts/build-node22-slice.sh
          scripts/build-node22-slice.sh arm64

      - name: Create device-only XCFramework
        run: |
          test -f "${RUNNER_TEMP}/node22-arm64/NodeMobile.framework/NodeMobile"
          mkdir -p Vendor
          xcodebuild -create-xcframework \
            -framework "${RUNNER_TEMP}/node22-arm64/NodeMobile.framework" \
            -output Vendor/NodeMobile.xcframework
          plutil -lint Vendor/NodeMobile.xcframework/Info.plist
          df -h /

      - name: Validate and package app
        run: |
          chmod +x scripts/package-ipa.sh
          node --check SillyTavernServer/Resources/nodejs-project/main.js
          node tests/smoke-runtime.mjs
          scripts/package-ipa.sh
          shasum -a 256 Build/SillyTavernServer-unsigned.ipa \
            | tee Build/SillyTavernServer-unsigned.ipa.sha256

      - name: Upload experimental device runtime and IPA
        uses: actions/upload-artifact@v4
        with:
          name: SillyTavernServer-stage2-node22-device-experimental
          path: |
            Vendor/NodeMobile.xcframework
            Build/SillyTavernServer-unsigned.ipa
            Build/SillyTavernServer-unsigned.ipa.sha256
            Build/linked-libraries.txt
            Build/ipa-contents.txt
          if-no-files-found: error
          retention-days: 7
